server:
    port: 8080
spring:
    application:
        name: gateway
    redis:
        port: 6379
        host: localhost
    cloud:
        gateway:
            discovery:
                locator:
                    enabled: true
            routes:
                - id: account-service
                  uri: lb://account-service
                  predicates:
                    - Path=/api/v1/accounts/**
                  filters:
                    - name: RequestRateLimiter
                      args:
                        redis-rate-limiter.replenishRate: 10
                        redis-rate-limiter.burstCapacity: 20
                        redis-rate-limiter.requestedTokens: 1
                    - AuthFilter:
eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/
            register-with-eureka: true
            fetch-registry: true
    instance:
        hostname: localhost